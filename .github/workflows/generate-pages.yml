name: Regenerar páginas de ticker

on:
  schedule:
    # Diariamente às 23:00 UTC (20:00 BRT) — após fechamento da B3
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Permite execução manual pelo GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar páginas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run generate

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Regenera páginas de ticker ($(date -u '+%Y-%m-%d'))"
            git push
          fi
