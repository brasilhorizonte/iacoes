name: Regenerar páginas de ticker

on:
  schedule:
    # Diariamente às 23:00 UTC (20:00 BRT) — após fechamento da B3
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # Permite execução manual pelo GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar páginas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run generate

      - name: Gerar redirects lowercase (Linux case-sensitive)
        run: |
          for dir in $(find . -maxdepth 1 -type d -regex './[A-Z].*' ! -name '.git' ! -name '.github'); do
            ticker=$(basename "$dir")
            lower=$(echo "$ticker" | tr '[:upper:]' '[:lower:]')
            if [ "$lower" != "$ticker" ] && [ ! -d "./$lower" ]; then
              mkdir -p "./$lower"
              cat > "./$lower/index.html" <<REDIR
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <title>${ticker} — Análise Fundamentalista | iAções</title>
            <link rel="canonical" href="https://iacoes.com.br/${ticker}/">
            <meta http-equiv="refresh" content="0; url=https://iacoes.com.br/${ticker}/">
            <meta name="robots" content="noindex, follow">
          </head>
          <body>
            <p>Redirecionando para <a href="/${ticker}/">${ticker}</a>...</p>
          </body>
          </html>
          REDIR
            fi
          done
          echo "Redirects lowercase gerados"

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sem mudanças para commitar"
          else
            git commit -m "Regenera páginas de ticker ($(date -u '+%Y-%m-%d'))"
            git push
          fi
